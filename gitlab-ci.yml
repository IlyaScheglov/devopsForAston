#Задать переменные в гите
#CI_REGISTRY_IMAGE - Название имаджа
#CI_PROJECT_DIR - какую-нибудь директорию в раннере для теста
#CI_REGISTRY - адрес нексуса
#CI_REGISTRY_USER - логин от нексуса
#CI_REGISTRY_PASSWORD - пароль от нексуса

stages:
  - build
  - test
  - deploy

variables:
  IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: "overlay2"

cache:
  paths:
    - .cache/pip/

before_script:
  - echo "Job: $CI_JOB_NAME"

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - docker pull "$IMAGE" || true
    - docker build --pull --cache-from "$IMAGE" -t "$IMAGE" .
    - docker push "$IMAGE"
  only:
    - branches
  tags:
    - docker

test:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - export DOCKER_IMAGE="$IMAGE"
    - docker compose pull || true
    - docker compose up --build -d
    - echo "Waiting for postgres..."
    - for i in $(seq 1 30); do docker compose exec -T db pg_isready -U BANK_DB && break || sleep 1; done
    - echo "Waiting for app health..."
    - APP_CID=$(docker compose ps -q app)
    - for i in $(seq 1 30); do STATUS=$(docker inspect --format='{{.State.Health.Status}}' $APP_CID 2>/dev/null || echo unknown); if [ "$STATUS" = "healthy" ]; then echo "app is healthy"; break; fi; sleep 2; done
    - docker compose logs app || true
    - docker compose down -v
  artifacts:
    when: always
    expire_in: 1h
    paths:
      - .cache/pip/
  only:
    - branches
  tags:
    - docker

deploy:
  stage: deploy
  script:
    - echo "Тестовый старт deploy"


stages:
  - build
  - test
  - deploy

variables:
  IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: "overlay2"

cache:
  paths:
    - .cache/pip/

before_script:
  - echo "Job: $CI_JOB_NAME"

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - docker pull "$IMAGE" || true
    - docker build --pull --cache-from "$IMAGE" -t "$IMAGE" .
    - docker push "$IMAGE"
  only:
    - main
  tags:
    - docker

test:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - export DOCKER_IMAGE="$IMAGE"
    - docker compose pull || true
    - docker compose up --build -d
    - echo "Waiting for postgres..."
    - for i in $(seq 1 30); do docker compose exec -T db pg_isready -U BANK_DB && break || sleep 1; done
    - echo "Waiting for app health..."
    - APP_CID=$(docker compose ps -q app)
    - for i in $(seq 1 30); do STATUS=$(docker inspect --format='{{.State.Health.Status}}' $APP_CID 2>/dev/null || echo unknown); if [ "$STATUS" = "healthy" ]; then echo "app is healthy"; break; fi; sleep 2; done
    - docker compose logs app || true
    - docker compose down -v
  artifacts:
    when: always
    expire_in: 1h
    paths:
      - .cache/pip/
  only:
    - main
  tags:
    - docker

deploy_to_k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  variables:
    KUBE_NAMESPACE: bank-app
  script:
    - echo "$KUBE_CONFIG_DATA" | base64 -d > kubeconfig
    - export KUBECONFIG="$CI_PROJECT_DIR/kubeconfig"
    - kubectl apply -f k8s/namespace.yaml
    - kubectl apply -f k8s/secret.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f k8s/configmap.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f k8s/postgres-headless-svc.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f k8s/postgres-statefulset.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f k8s/postgres-exporter-deployment.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f k8s/microservice-service.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f k8s/microservice-deployment.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/prometheus-configmap.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/prometheus-deployment.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/alerts.yml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/grafana-datasource.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/grafana-deployment.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/grafana-dashboard-microservice.yaml -n $KUBE_NAMESPACE
    - kubectl apply -f monitoring/grafana-dashboard-postgres.yaml -n $KUBE_NAMESPACE
  only:
    - main
  when: manual
  dependencies: []
  tags:
    - kuber
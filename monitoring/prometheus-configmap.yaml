apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: bank-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'kubernetes-pods'
        static_configs:
          - targets: ['microservice:5000']
            labels: {job: "microservice"}
      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter:9187']
            labels: {job: "postgres-exporter"}
    rule_files:
      - /etc/prometheus/alerts/alerts.yml

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgres
  namespace: bank-app
  labels:
    grafana_dashboard: "1"
data:
  postgres-dashboard.json: |
    {
      "annotations": { "list": [] },
      "panels": [
        {
          "type":"graph",
          "title":"Postgres active connections",
          "targets":[{"expr":"pg_stat_activity_count{job=\"postgres-exporter\"}","legendFormat":"connections"}]
        },
        {
          "type":"graph",
          "title":"Postgres memory usage (example)",
          "targets":[{"expr":"process_resident_memory_bytes{job=\"postgres-exporter\"}","legendFormat":"memory"}]
        }
      ],
      "title":"Postgres Overview",
      "schemaVersion":16
    }

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-microservice
  namespace: bank-app
  labels:
    grafana_dashboard: "1"
data:
  microservice-dashboard.json: |
    {
      "annotations": { "list": [] },
      "panels": [
        {
          "type":"graph",
          "title":"Microservice CPU (rate)",
          "targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{image=~\".*microservice.*\"}[1m])) by (pod)","legendFormat":"{{pod}}"}]
        },
        {
          "type":"graph",
          "title":"Microservice Memory",
          "targets":[{"expr":"sum(container_memory_working_set_bytes{image=~\".*microservice.*\"}) by (pod)","legendFormat":"{{pod}}"}]
        },
        {
          "type":"graph",
          "title":"HTTP request duration (example)",
          "targets":[{"expr":"histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"microservice\"}[5m])) by (le))","legendFormat":"p95"}]
        }
      ],
      "title":"Microservice Overview",
      "schemaVersion":16
    }
